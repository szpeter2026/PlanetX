<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>跳转中 - PlanetX</title>
  <style>
    :root { --bg: #080810; --lime: #C8FF50; --purple: #6B3FA0; --mist: #B8B8C8; }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'PingFang SC','Microsoft YaHei',system-ui,sans-serif;
      background: var(--bg); color: #E8E8F0; min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center; gap:20px; padding:2rem;
    }
    .logo { font-size:2.5rem; font-weight:900; color:var(--lime); letter-spacing:0.06em; }
    .logo .x { display:inline-block; color:var(--purple); }
    .subtitle { font-size:0.85rem; color:var(--mist); }
    .btn {
      display:inline-flex; align-items:center; gap:8px;
      padding:12px 28px; border-radius:24px; font-size:0.9rem; font-weight:700;
      cursor:pointer; text-decoration:none; border:none;
      background:linear-gradient(135deg, var(--purple), #8B5CF6);
      color:#fff; box-shadow: 0 4px 20px rgba(107,63,160,0.4);
      transition:all 0.3s;
    }
    .btn:hover { transform:translateY(-1px); box-shadow: 0 6px 30px rgba(107,63,160,0.6); }
    .footnote { font-size:0.7rem; color:var(--mist); opacity:0.5; margin-top:8px; }
  </style>
  <meta http-equiv="refresh" content="2;url=index.html">
</head>
<body>
  <div class="logo">Planet<span class="x">X</span></div>
  <div class="subtitle">
    登录 / 注册已迁移至首页 Looma API<br>
    Supabase 依赖已移除 — 正在跳转…
  </div>
  <a class="btn" href="index.html">🚀 前往 PlanetX 首页</a>
  <div class="footnote">
    自动跳转中（2 秒）· 若未跳转请点击上方按钮
  </div>
  <script>
    console.log('%c[auth.html] Supabase deprecated — redirecting to index.html (Looma API)', 'color:#C8FF50;');
  </script>
</body>
</html>
